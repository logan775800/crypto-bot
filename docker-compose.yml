services:
  crypto-bot:
    image: python:3.11-slim
    container_name: crypto-bot
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      AI_API_KEY: ${AI_API_KEY}
      AI_BASE_URL: ${AI_BASE_URL}
      AI_MODEL: ${AI_MODEL}
      ADMIN_CHAT_ID: ${ADMIN_CHAT_ID}
      JENKINS_URL: ${JENKINS_URL:-}
      JENKINS_JOB: ${JENKINS_JOB:-update-crypto-bot}
      JENKINS_DEPLOY_TOKEN: ${JENKINS_DEPLOY_TOKEN:-}
      JENKINS_USER: ${JENKINS_USER:-}
      JENKINS_API_TOKEN: ${JENKINS_API_TOKEN:-}
      ETHERSCAN_API_KEY: ${ETHERSCAN_API_KEY:-}
      # Bybit 实盘台/网格/AI查账户用。缺这三行 → 容器拿不到密钥，功能全部失效
      BYBIT_API_KEY: ${BYBIT_API_KEY:-}
      BYBIT_API_SECRET: ${BYBIT_API_SECRET:-}
      BYBIT_TESTNET: ${BYBIT_TESTNET:-true}
      TZ: Asia/Shanghai
    command: >
      bash -c "pip install --no-cache-dir -r requirements.txt && python bot.py"
